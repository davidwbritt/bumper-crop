<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bumper Crop</title>
<meta name="description" content="A penny-arcade orchard machine: drop apples through brass pegs, ring the bumpers, land the big baskets. Upgrade, nudge — but don't TILT. Free, offline, one file.">
<meta property="og:title" content="Bumper Crop — a penny-arcade orchard machine">
<meta property="og:description" content="Drop apples. Ring bumpers. Don't TILT. One more ball.">
<meta property="og:type" content="website">
<style>
  :root{
    --wood:#5a3a22;
    --wood-dark:#3d2614;
    --wood-lite:#7a5433;
    --board:#f3e9d0;
    --board-line:#d9cbaa;
    --brass:#c9a24a;
    --brass-lite:#eed488;
    --apple:#b4342a;
    --leaf:#4a6b3a;
    --ink:#2c2114;
    --gold:#e0b64f;
    --display:'Didot','Bodoni MT','Playfair Display','Baskerville','Times New Roman',serif;
    --util:'Optima','Candara','Gill Sans','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  /* itch.io embeds block viewport scrolling; constrain the root so the body scrolls itself */
  html.embedded{height:100%;overflow:hidden}
  html.embedded body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
  body{
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(238,212,136,.08), transparent 60%),
      #241a10;
    color:var(--board);
    font-family:var(--util);
    display:flex;align-items:flex-start;justify-content:center;
    padding:18px 10px 40px;
    overflow-y:auto;
  }
  .cab{
    background:linear-gradient(175deg, var(--wood-lite), var(--wood) 30%, var(--wood-dark));
    border-radius:14px;
    padding:14px 16px 12px;
    box-shadow:0 30px 60px -24px rgba(0,0,0,.9), inset 0 2px 0 rgba(238,212,136,.25);
    max-width:1020px;width:100%;
    display:grid;grid-template-columns:minmax(300px,520px) minmax(230px,300px);
    gap:14px;justify-content:center;
  }
  .marquee{
    grid-column:1 / -1;
    background:linear-gradient(180deg,#20160c,#33220f);
    border:2px solid var(--brass);border-radius:8px;
    padding:10px 18px;
    display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
    box-shadow:inset 0 0 24px rgba(0,0,0,.6);
  }
  .marquee h1{
    font-family:var(--display);font-weight:500;font-size:clamp(22px,4vw,34px);
    color:var(--brass-lite);letter-spacing:.04em;
    text-shadow:0 0 18px rgba(238,212,136,.35);
  }
  .marquee .tag{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:#9b7d45}
  .marquee .spacer{flex:1}
  .lcd{
    font-family:var(--util);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9b7d45;
  }
  .lcd b{
    color:var(--brass-lite);font-size:20px;letter-spacing:.06em;
    text-shadow:0 0 12px rgba(238,212,136,.4);
    font-variant-numeric:tabular-nums;
  }
  .playfield{position:relative}
  canvas{
    display:block;width:100%;height:auto;
    background:var(--board);
    border:3px solid var(--brass);
    border-radius:8px;
    box-shadow:inset 0 8px 30px rgba(60,40,10,.25);
    cursor:crosshair;
    touch-action:none;
  }
  .cab.shake .playfield{animation:shake .18s}
  @keyframes shake{0%{transform:translate(0)}25%{transform:translate(-5px,2px)}55%{transform:translate(4px,-2px)}100%{transform:translate(0)}}
  #tiltbanner{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(30,15,8,.72);border-radius:8px;z-index:5;
    font-family:var(--display);font-size:64px;color:#ff5b4a;letter-spacing:.2em;
    text-shadow:0 0 30px rgba(255,91,74,.7);
  }
  #tiltbanner.on{display:flex;animation:tiltblink .5s steps(2) infinite}
  @keyframes tiltblink{50%{opacity:.55}}

  .controls{
    display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;
  }
  .controls button{
    background:linear-gradient(180deg,#33220f,#20160c);
    border:1.5px solid var(--brass);border-radius:6px;color:var(--brass-lite);
    font-family:var(--util);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    padding:9px 14px;cursor:pointer;
  }
  .controls button:hover{background:#3d2a12}
  .controls button:disabled{opacity:.4;cursor:default}
  .controls .hopper{
    font-size:16px;letter-spacing:4px;color:var(--apple);
    background:var(--board);border:1.5px solid var(--brass);border-radius:6px;
    padding:6px 12px;min-width:110px;text-align:center;
  }
  .controls .spacer{flex:1}

  .shop{
    background:linear-gradient(180deg,#2a1c0e,#1e1409);
    border:2px solid var(--brass);border-radius:8px;
    padding:14px;align-self:start;
  }
  .shop h2{
    font-family:var(--util);font-weight:400;font-size:11px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--brass-lite);
    border-bottom:1px solid rgba(201,162,74,.4);padding-bottom:8px;margin-bottom:10px;
    display:flex;justify-content:space-between;
  }
  .shop .item{
    display:flex;align-items:center;gap:10px;
    padding:8px 0;border-bottom:1px dotted rgba(201,162,74,.25);
  }
  .shop .item .info{flex:1;min-width:0}
  .shop .item .nm{font-size:12.5px;color:var(--board);letter-spacing:.04em}
  .shop .item .ds{font-size:10.5px;color:#9b7d45;line-height:1.4}
  .shop .item button{
    background:linear-gradient(180deg,var(--brass),#9b7a35);
    border:none;border-radius:5px;color:#20160c;
    font-family:var(--util);font-size:10.5px;letter-spacing:.06em;font-weight:600;
    padding:7px 10px;cursor:pointer;white-space:nowrap;
    min-width:74px;
  }
  .shop .item button:hover{filter:brightness(1.12)}
  .shop .item button:disabled{opacity:.35;cursor:default;filter:none}
  .shop .lvl{font-size:9px;letter-spacing:.14em;color:#9b7d45}

  .tw label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9b7d45;margin-bottom:5px}
  .tw label b{color:var(--brass-lite);letter-spacing:.06em}
  .tw input[type=range]{width:100%;accent-color:var(--brass)}
  .twrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
  .twrow button{
    background:#20160c;border:1px solid rgba(201,162,74,.5);border-radius:5px;
    color:#9b7d45;font-family:var(--util);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:6px 9px;cursor:pointer;
  }
  .twrow button:hover{color:var(--brass-lite)}
  .twrow button[aria-pressed="true"]{background:var(--brass);color:#20160c;border-color:var(--brass)}

  footer{
    grid-column:1 / -1;
    display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
    font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#9b7d45;
    padding:8px 6px 2px;
  }
  footer a,footer button.lk{
    color:var(--brass-lite);text-decoration:none;background:none;border:none;
    font:inherit;letter-spacing:inherit;text-transform:inherit;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;
  }
  .toast{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:50;
    background:var(--board);color:var(--ink);padding:10px 20px;border-radius:4px;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    box-shadow:0 14px 30px -10px rgba(0,0,0,.8);
  }
  @media (max-width:820px){
    .cab{grid-template-columns:1fr}
    .shop{order:3}
  }
</style>
</head>
<body>
<div class="cab" id="cab">
  <div class="marquee">
    <h1>Bumper Crop</h1>
    <span class="tag">Drop apples · steer the paddle · fill the big baskets</span>
    <span class="spacer"></span>
    <span class="lcd">Coins <b id="lcd-coins">0</b></span>
    <span class="lcd">Best drop <b id="lcd-best">0</b></span>
  </div>

  <div>
    <div class="playfield">
      <canvas id="pf" width="480" height="680" aria-label="The orchard machine"></canvas>
      <div id="tiltbanner">TILT</div>
    </div>
    <div class="controls">
      <span class="hopper" id="hopper" title="Apples in the hopper">●●●</span>
      <span style="font-size:9px;letter-spacing:.14em;color:#9b7d45">CLICK / ↓ · DROP&nbsp;&nbsp;SPACE · HOP&nbsp;&nbsp;← → · AIM</span>
      <button id="btn-nudge" style="display:none" title="Shove the cabinet (N). Three in quick order and she TILTs.">Nudge (N)</button>
      <span class="spacer"></span>
      <button id="btn-daily" title="Same board for everyone, new at midnight UTC">Daily board</button>
      <button id="btn-new" title="A fresh peg layout">New board</button>
      <button id="btn-share" title="Copy this board’s permanent address">Share</button>
      <button id="btn-mute">Sound: on</button>
    </div>
  </div>

  <aside class="shop">
    <h2><span>The Back Counter</span><span id="shop-coins"></span></h2>
    <div id="shop-items"></div>
    <h2 style="margin-top:16px"><span>The Tinker’s Hatch</span><span>free</span></h2>
    <div class="tw">
      <label>Paddle feel — <b id="tw-pad-lab"></b></label>
      <input type="range" id="tw-pad" min="15" max="80" step="5" aria-label="Paddle responsiveness">
      <label style="margin-top:10px">Peg bounce — <b id="tw-bounce-lab"></b></label>
      <input type="range" id="tw-bounce" min="50" max="92" step="3" aria-label="Peg bounciness">
      <label style="margin-top:10px">Paint scheme</label>
      <div class="twrow" id="tw-theme">
        <button data-th="orchard">Orchard</button><button data-th="midnight">Midnight</button><button data-th="circus">Circus</button><button data-th="copper">Copper</button>
      </div>
      <label style="margin-top:10px">Bumpers <span style="color:#9b7d45">(square hit different — literally)</span></label>
      <div class="twrow" id="tw-bump">
        <button data-bp="round">Round</button><button data-bp="square">Square</button>
      </div>
      <label style="margin-top:12px">Drastic measures</label>
      <div class="twrow">
        <button id="tw-reset" style="border-color:#a04a3a;color:#d08a7a">Sell the machine — start fresh</button>
      </div>
    </div>
  </aside>

  <footer>
    <span>Board “<span id="f-seed"></span>” · same seed, same pegs, forever</span>
    <span>no accounts · no ads · by <a href="https://clevermonkey.itch.io/">clevermonkey</a> · <a href="https://ko-fi.com/clevermonkey">tip the machine ♥</a></span>
  </footer>
</div>

<script>
'use strict';

/* ================= seeded randomness (board layout only) ================= */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  };
}
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function makeRng(s){ const h = xmur3(s); return mulberry32(h()); }
function pick(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }
function rint(rng, a, b){ return a + Math.floor(rng() * (b - a + 1)); }
function chance(rng, p){ return rng() < p; }
function shuffle(rng, arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const R = Math.random;

const SEED_A = ['orchard', 'cider', 'russet', 'pippin', 'bramley', 'windfall', 'harvest', 'scrumpy'];
const SEED_B = ['lane', 'row', 'field', 'press', 'loft', 'gate', 'fair', 'moot'];
function randomSeed(){
  return SEED_A[Math.floor(R() * SEED_A.length)] + '-' + SEED_B[Math.floor(R() * SEED_B.length)] + '-' + Math.floor(R() * 900 + 100);
}

/* ================= sound: tiny synth, no assets ================= */
let AC = null, muted = false;
function ac(){
  if (!AC){
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e){ AC = null; }
  }
  return AC;
}
function tone(freq, dur, type, vol, slide){
  if (muted) return;
  const ctx = ac();
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ctx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq * slide), ctx.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + dur + 0.02);
}
const SFX = {
  peg(){ tone(1100 + R() * 500, 0.05, 'triangle', 0.05); },
  bumper(){ tone(180 + R() * 60, 0.16, 'square', 0.09, 2.2); },
  basket(mult){
    const base = 420 + Math.min(6, mult) * 60;
    tone(base, 0.12, 'sine', 0.09);
    setTimeout(() => tone(base * 1.25, 0.12, 'sine', 0.08), 70);
    if (mult >= 5) setTimeout(() => tone(base * 1.5, 0.2, 'sine', 0.09), 140);
  },
  drop(){ tone(300, 0.06, 'sine', 0.05, 0.7); },
  buy(){ tone(700, 0.09, 'triangle', 0.08); setTimeout(() => tone(1050, 0.12, 'triangle', 0.08), 60); },
  nudge(){ tone(90, 0.12, 'square', 0.1, 0.8); },
  tilt(){ tone(120, 0.5, 'sawtooth', 0.1, 0.5); setTimeout(() => tone(90, 0.6, 'sawtooth', 0.09, 0.5), 220); },
  gold(){ tone(1300, 0.3, 'sine', 0.07, 1.4); },
  caw(){
    tone(620, 0.14, 'sawtooth', 0.07, 0.6);
    setTimeout(() => tone(540, 0.16, 'sawtooth', 0.06, 0.55), 130);
  }
};

/* ================= the board ================= */
const W = 480, H = 680;
const BALL_R = 7, PEG_R = 5, BUMP_R = 17;
const GRAV = 980, REST_PEG = 0.72, REST_WALL = 0.6, MAXV = 950;
const SLOT_N = 7, SLOT_W = W / SLOT_N, SLOT_TOP = 596;

let B = null;   /* the board (seeded) */

function buildBoard(seed){
  const rng = makeRng('board:' + seed);
  const board = { seed, pegs: [], bumpers: [], slots: [] };
  /* pegs: staggered rows with seeded gaps and jitter */
  const rows = 8, y0 = 150, dy = 44;
  for (let r = 0; r < rows; r++){
    const off = (r % 2) ? 22 : 0;
    for (let x = 36 + off; x <= W - 30; x += 44){
      if (chance(rng, 0.12)) continue;           /* seeded lanes */
      board.pegs.push({
        x: x + rint(rng, -4, 4),
        y: y0 + r * dy + rint(rng, -3, 3),
        flash: 0
      });
    }
  }
  /* bumpers: three, spread out, not too close to pegs' spirit (pegs near them get culled) */
  let guard = 0;
  while (board.bumpers.length < 3 && guard++ < 200){
    const bx = rint(rng, 70, W - 70), by = rint(rng, 195, 460);
    if (board.bumpers.some(b => (b.x - bx) ** 2 + (b.y - by) ** 2 < 130 * 130)) continue;
    board.bumpers.push({ x: bx, y: by, flash: 0 });
  }
  board.pegs = board.pegs.filter(p => !board.bumpers.some(b => (b.x - p.x) ** 2 + (b.y - p.y) ** 2 < (BUMP_R + PEG_R + 14) ** 2));
  /* baskets: seeded multiplier order, always one big one */
  board.slots = shuffle(rng, [10, 5, 3, 2, 1, 1, 2]);
  /* rollovers: light the letters, arm the kickback */
  board.rolls = ['C', 'R', 'O', 'P'].map((ch, i) => ({ ch, x: 100 + i * 94, y: 116, lit: false, flash: 0 }));
  board.kickArmed = false;
  /* drop targets: a bank of three on a seeded side */
  const bankX = chance(rng, 0.5) ? rint(rng, 60, 150) : rint(rng, 260, 350);
  board.prism = null;
  board.bank = { resetAt: 0, targets: [0, 1, 2].map(i => ({ x: bankX + i * 26, y: 508, w: 16, h: 22, up: true })) };
  board.pegs = board.pegs.filter(p => !(Math.abs(p.y - 512) < 40 && p.x > bankX - 26 && p.x < bankX + 96));
  return board;
}

/* ================= game state (global, persists across boards) ================= */
const DEFAULT_SAVE = {
  coins: 0, best: 0, muted: false,
  up: { hopper: 0, regen: 0, bumper: 0, gold: 0, split: 0, nudge: 0, paddle: 0 },
  tw: { pad: 60, theme: 'orchard', bumper: 'round', bounce: 72 }
};
/* the paddle: rides above the baskets, follows the mouse */
const PAD_Y = 566, PAD_H = 9, PAD_JUMP_T = 0.32, PAD_JUMP_H = 18;
let padX = W / 2;
let padJumpT = 0;   /* time left in the current hop */
let padPulse = 0;   /* squash on impact */
let padFx = [];     /* impact rings */
function padThock(vy){
  tone(150 + Math.min(500, vy) * 0.14, 0.09, 'square', Math.min(0.11, 0.045 + vy / 9000), 1.5);
}
function padW(){ return 66 + 13 * S.up.paddle; }
function padYEff(){
  if (padJumpT <= 0) return PAD_Y;
  return PAD_Y - PAD_JUMP_H * Math.sin(Math.PI * (1 - padJumpT / PAD_JUMP_T));
}
function padRising(){ return padJumpT > PAD_JUMP_T / 2; }
function padJump(){
  if (padJumpT > 0 || tilted()) return;
  padJumpT = PAD_JUMP_T;
  tone(240, 0.07, 'square', 0.06, 1.5);
}
let S = null;      /* save */
let balls = [];
let hopper = 3;
let regenAt = 0;
let aimX = W / 2;
let popups = [];
let tiltHeat = 0, tiltedUntil = 0, lastNudges = [];
let crows = [];   /* at most one thief at a time */
const CROW_CHANCE = 0.05;

function hopperCap(){ return 3 + S.up.hopper; }
function regenMs(){ return Math.max(900, 4000 * Math.pow(0.85, S.up.regen)); }
function bumperVal(){ return 25 + 12 * S.up.bumper; }
function goldChance(){ return 0.04 * S.up.gold; }
function splitChance(){ return 0.05 * S.up.split; }
function tilted(){ return performance.now() < tiltedUntil; }

/* ================= physics ================= */
function dropBall(){
  if (tilted() || hopper <= 0 || balls.length > 14) return;
  hopper--;
  const golden = R() < goldChance();
  balls.push({
    x: Math.max(BALL_R + 4, Math.min(W - BALL_R - 4, aimX)),
    y: 96, vx: (R() - 0.5) * 30, vy: 40,
    score: 0, golden, dead: false
  });
  SFX.drop();
  if (golden) SFX.gold();
  /* somewhere on a wire, a crow takes an interest */
  if (crows.length === 0 && R() < CROW_CHANCE){
    crows.push({
      state: 'wait', delay: 0.7 + R() * 0.9,
      target: balls[balls.length - 1],
      x: R() < 0.5 ? -34 : W + 34, y: 0,
      vx: 0, vy: 0, flap: 0
    });
  }
  renderHopper();
}

function step(dt){
  const now = performance.now();
  /* hopper regen */
  if (hopper < hopperCap() && now >= regenAt){
    hopper++;
    regenAt = now + regenMs();
    renderHopper();
  }
  /* tilt heat cools */
  tiltHeat = Math.max(0, tiltHeat - dt * 0.28);

  /* the paddle rides the mouse — feel set at the Tinker's Hatch */
  padX += (Math.max(BALL_R + 4, Math.min(W - BALL_R - 4, aimX)) - padX) * Math.min(1, dt * (S.tw ? S.tw.pad : 60));
  if (padJumpT > 0) padJumpT = Math.max(0, padJumpT - dt);
  padPulse = Math.max(0, padPulse - dt);
  for (const f of padFx) f.t += dt;
  padFx = padFx.filter(f => f.t < 0.28);

  /* drop targets stand back up after a spell */
  if (B.bank.resetAt && now >= B.bank.resetAt){
    B.bank.resetAt = 0;
    B.bank.targets.forEach(t => { t.up = true; });
  }
  /* the prism fades when spent or stale */
  if (B.prism){
    B.prism.flash = Math.max(0, B.prism.flash - dt);
    if (B.prism.charges <= 0 || now >= B.prism.until){
      popup(B.prism.x, B.prism.y, 'the prism fades', 'ink');
      B.prism = null;
    }
  }
  for (const r of B.rolls) r.flash = Math.max(0, r.flash - dt);

  /* the crow */
  for (const c of crows){
    c.flap += dt;
    if (c.state === 'wait'){
      c.delay -= dt;
      if (c.delay <= 0){
        if (!c.target || c.target.dead || c.target.carried){ c.state = 'gone'; continue; }
        c.state = 'swoop';
        c.y = Math.max(30, c.target.y - 120);
        SFX.caw();
      }
    } else if (c.state === 'swoop'){
      if (!c.target || c.target.dead || c.target.carried || c.target.y > SLOT_TOP - 20){
        c.state = 'leave';
      } else {
        const dx = c.target.x - c.x, dy = (c.target.y - 6) - c.y;
        const d = Math.max(0.001, Math.hypot(dx, dy));
        const sp = 340;
        c.vx = dx / d * sp; c.vy = dy / d * sp;
        c.x += c.vx * dt; c.y += c.vy * dt;
        if (d < 14){
          c.state = 'carry';
          c.target.carried = true;
          popup(c.x, c.y - 24, 'A CROW!', 'tilt');
          SFX.caw();
        }
      }
    } else if (c.state === 'carry'){
      c.vx += (c.vx >= 0 ? 60 : -60) * dt;
      if (Math.abs(c.vx) < 90) c.vx = c.vx >= 0 ? 90 : -90;
      c.vy = -170;
      c.x += c.vx * dt; c.y += c.vy * dt;
      if (c.target){ c.target.x = c.x; c.target.y = c.y + 13; }
      if (c.y < -40 || c.x < -60 || c.x > W + 60){
        if (c.target){ c.target.dead = true; c.target.carried = false; }
        popup(Math.max(30, Math.min(W - 30, c.x)), 40, 'stolen.', 'ink');
        c.state = 'gone';
      }
    } else if (c.state === 'leave'){
      c.vy = -240;
      c.vx = (c.vx >= 0 ? 1 : -1) * 200;
      c.x += c.vx * dt; c.y += c.vy * dt;
      if (c.y < -40 || c.x < -60 || c.x > W + 60) c.state = 'gone';
    }
  }
  crows = crows.filter(c => c.state !== 'gone');

  for (const b of balls){
    if (b.dead) continue;
    if (b.carried){ continue; }   /* in the crow's beak: no physics applies */
    b.vy += GRAV * dt;
    const sp = Math.hypot(b.vx, b.vy);
    if (sp > MAXV){ b.vx = b.vx / sp * MAXV; b.vy = b.vy / sp * MAXV; }
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    /* walls */
    if (b.x < BALL_R){ b.x = BALL_R; b.vx = Math.abs(b.vx) * REST_WALL; }
    if (b.x > W - BALL_R){ b.x = W - BALL_R; b.vx = -Math.abs(b.vx) * REST_WALL; }
    if (b.y < BALL_R){ b.y = BALL_R; b.vy = Math.abs(b.vy) * REST_WALL; }

    /* rollovers: no physics, just light the letter as the ball passes */
    for (const r of B.rolls){
      if (!r.lit && Math.abs(b.x - r.x) < 15 && Math.abs(b.y - r.y) < 15){
        r.lit = true; r.flash = 0.4;
        b.score += 5;
        SFX.peg();
        if (B.rolls.every(q => q.lit)){
          B.rolls.forEach(q => { q.lit = false; });
          B.kickArmed = true;
          popup(W / 2, 140, 'C·R·O·P — KICKBACK ARMED', 'gold');
          SFX.buy();
        }
      }
    }

    /* drop targets: standing tabs; knock the bank down for a coin burst */
    for (const t of B.bank.targets){
      if (!t.up) continue;
      const qx = Math.max(t.x - t.w / 2, Math.min(t.x + t.w / 2, b.x));
      const qy = Math.max(t.y - t.h / 2, Math.min(t.y + t.h / 2, b.y));
      const dx = b.x - qx, dy = b.y - qy;
      if (dx * dx + dy * dy < BALL_R * BALL_R){
        t.up = false;
        b.score += 15;
        popup(t.x, t.y - 20, '+15', 'bump');
        SFX.bumper();
        const d = Math.max(0.001, Math.hypot(dx, dy));
        b.vx = (dx / d) * 260 + (R() - 0.5) * 40;
        b.vy = (dy / d) * 260 - 40;
        if (B.bank.targets.every(q => !q.up)){
          const prize = 150 + 60 * S.up.bumper;
          S.coins += prize;
          popup(t.x, t.y - 40, 'BANK! +' + prize, 'gold');
          SFX.basket(5);
          B.bank.resetAt = now + 12000;
          /* the prize behind the prize: a prism peg appears */
          let px = 0, py2 = 0, tries = 0;
          do {
            px = 70 + R() * (W - 140);
            py2 = 260 + R() * 160;
            tries++;
          } while (tries < 24 && B.bumpers.some(q => (q.x - px) ** 2 + (q.y - py2) ** 2 < 60 * 60));
          B.prism = { x: px, y: py2, charges: 3, until: now + 20000, flash: 0 };
          popup(px, py2 - 24, 'A PRISM PEG!', 'gold');
          SFX.gold();
          save(); renderLCD(); renderShop();
        }
      }
    }

    /* the prism peg: bounce, and every strike births a ball */
    if (B.prism){
      const pr = B.prism;
      const dx = b.x - pr.x, dy = b.y - pr.y;
      const d2 = dx * dx + dy * dy, rr = BALL_R + 9;
      if (d2 < rr * rr && d2 > 0.0001){
        const d = Math.sqrt(d2), nx = dx / d, ny = dy / d;
        b.x = pr.x + nx * rr; b.y = pr.y + ny * rr;
        const dot = b.vx * nx + b.vy * ny;
        if (dot < 0){
          b.vx -= 1.8 * dot * nx;
          b.vy -= 1.8 * dot * ny;
          if (pr.flash <= 0 && balls.length < 14){
            pr.charges--;
            pr.flash = 0.3;
            balls.push({ x: pr.x + (R() - 0.5) * 8, y: pr.y - 16, vx: (R() - 0.5) * 240, vy: -340, score: 0, golden: false, dead: false });
            popup(pr.x, pr.y - 26, 'SPAWN!', 'split');
            SFX.gold();
          }
        }
      }
    }

    /* pegs */
    for (const p of B.pegs){
      const dx = b.x - p.x, dy = b.y - p.y;
      const d2 = dx * dx + dy * dy, rr = BALL_R + PEG_R;
      if (d2 < rr * rr && d2 > 0.0001){
        const d = Math.sqrt(d2), nx = dx / d, ny = dy / d;
        b.x = p.x + nx * rr; b.y = p.y + ny * rr;
        const dot = b.vx * nx + b.vy * ny;
        if (dot < 0){
          const rest = S.tw && S.tw.bounce ? S.tw.bounce / 100 : REST_PEG;
          b.vx -= (1 + rest) * dot * nx;
          b.vy -= (1 + rest) * dot * ny;
          b.vx += (R() - 0.5) * 26;   /* a little organic scatter */
          if (p.flash <= 0){ b.score += 1; SFX.peg(); }
          p.flash = 0.12;
        }
      }
    }
    /* bumpers — round discs or, for the tinkerers, true squares */
    for (const p of B.bumpers){
      let hit = false, nx = 0, ny = -1;
      if (S.tw.bumper === 'square'){
        const hs = 15;
        const qx = Math.max(p.x - hs, Math.min(p.x + hs, b.x));
        const qy = Math.max(p.y - hs, Math.min(p.y + hs, b.y));
        const dx = b.x - qx, dy = b.y - qy;
        const d2 = dx * dx + dy * dy;
        if (d2 < BALL_R * BALL_R){
          hit = true;
          const d = Math.sqrt(d2);
          if (d < 0.0001){ nx = 0; ny = -1; b.y = p.y - hs - BALL_R; }
          else { nx = dx / d; ny = dy / d; b.x = qx + nx * BALL_R; b.y = qy + ny * BALL_R; }
        }
      } else {
        const dx = b.x - p.x, dy = b.y - p.y;
        const d2 = dx * dx + dy * dy, rr = BALL_R + BUMP_R;
        if (d2 < rr * rr && d2 > 0.0001){
          hit = true;
          const d = Math.sqrt(d2);
          nx = dx / d; ny = dy / d;
          b.x = p.x + nx * rr; b.y = p.y + ny * rr;
        }
      }
      if (hit){
        if (!tilted()){
          const kick = 430;
          b.vx = nx * kick + (R() - 0.5) * 60;
          b.vy = ny * kick - 60;
          b.score += bumperVal();
          popup(p.x, p.y - BUMP_R - 8, '+' + bumperVal(), 'bump');
          p.flash = 0.22;
          SFX.bumper();
          if (R() < splitChance() && balls.length < 14){
            balls.push({ x: b.x, y: b.y, vx: -b.vx * 0.7, vy: -120, score: 0, golden: false, dead: false });
            popup(b.x, b.y - 18, 'SPLIT!', 'split');
          }
        } else {
          /* tilted: bumpers are dead rubber */
          const dot = b.vx * nx + b.vy * ny;
          if (dot < 0){ b.vx -= 1.4 * dot * nx; b.vy -= 1.4 * dot * ny; }
        }
      }
    }
    /* end bumpers */
    /* the paddle: catches falling apples, adds english toward its edges.
       gentle balls roll through — unless the paddle HOPS (space / right-click),
       which volleys anything it touches, rescue included */
    {
      const py = padYEff();
      const inBand = b.y + BALL_R > py && b.y < py + PAD_H + BALL_R &&
        Math.abs(b.x - padX) < padW() / 2 + BALL_R * 0.6;
      if (inBand && !tilted()){
        if (padRising() && b.vy > -60){
          /* struck by the rising plank: real energy in */
          b.y = py - BALL_R - 1;
          const inVy = Math.abs(b.vy);
          b.vy = -(430 + inVy * 0.55);
          b.vx += ((b.x - padX) / (padW() / 2)) * 260;
          b.vx = Math.max(-620, Math.min(620, b.vx));
          padPulse = 0.14;
          padFx.push({ x: b.x, y: py, t: 0, big: true });
          SFX.bumper();
        } else if (b.vy > 150){
          const inVy = b.vy;
          b.y = py - BALL_R;
          b.vy = -b.vy * 0.87;
          b.vx += ((b.x - padX) / (padW() / 2)) * 230;
          b.vx = Math.max(-620, Math.min(620, b.vx));
          padPulse = Math.min(0.14, 0.05 + inVy / 8000);
          padFx.push({ x: b.x, y: py, t: 0, big: false });
          padThock(inVy);
        }
      }
    }

    /* basket dividers: simple vertical walls from SLOT_TOP down */
    if (b.y > SLOT_TOP - BALL_R){
      const k = Math.round(b.x / SLOT_W);
      const wallX = k * SLOT_W;
      if (k > 0 && k < SLOT_N && Math.abs(b.x - wallX) < BALL_R + 2){
        b.x = wallX + Math.sign(b.x - wallX || 1) * (BALL_R + 2);
        b.vx = -b.vx * 0.5;
      }
    }
    /* landed */
    if (b.y > H - BALL_R - 6){
      const slot = Math.max(0, Math.min(SLOT_N - 1, Math.floor(b.x / SLOT_W)));
      const mult = B.slots[slot];
      /* the kickback: an armed save fires the ball out of a ×1 basket */
      if (mult === 1 && B.kickArmed){
        B.kickArmed = false;
        b.y = SLOT_TOP - BALL_R - 4;
        b.vy = -(760 + R() * 100);
        b.vx = Math.max(-260, Math.min(260, (W / 2 - b.x) * 1.4));
        popup(b.x, SLOT_TOP - 30, 'KICKBACK!', 'tilt');
        SFX.bumper();
        continue;
      }
      b.dead = true;
      let payout = Math.max(1, b.score) * mult;
      if (b.golden) payout *= 5;
      S.coins += payout;
      S.best = Math.max(S.best, payout);
      bumpBest(payout);
      popup(b.x, H - 40, '+' + payout + (b.golden ? ' ✦' : ''), b.golden ? 'gold' : 'ink');
      SFX.basket(mult);
      save();
      renderLCD();
      renderShop();
    }
  }
  balls = balls.filter(b => !b.dead);
  for (const p of B.pegs) p.flash = Math.max(0, p.flash - dt);
  for (const p of B.bumpers) p.flash = Math.max(0, p.flash - dt);
  for (const q of popups){ q.t += dt; q.y -= 34 * dt; }
  popups = popups.filter(q => q.t < 1.1);
}

function popup(x, y, text, color){
  popups.push({ x, y, text, color, t: 0 });
}

/* nudge: the pinball inheritance */
function nudge(){
  if (!S.up.nudge || tilted()) return;
  const now = performance.now();
  lastNudges = lastNudges.filter(t => now - t < 4000);
  lastNudges.push(now);
  const dir = aimX < W / 2 ? 1 : -1;
  for (const b of balls){
    if (b.carried) continue;
    b.vx += dir * (110 + R() * 70);
    b.vy -= 70 + R() * 40;
  }
  /* a good shake startles the thief */
  for (const c of crows){
    if (c.state === 'carry' && c.target){
      c.target.carried = false;
      c.target.vx = (R() - 0.5) * 120;
      c.target.vy = 60;
      c.target = null;
      popup(c.x, c.y - 20, 'DROPPED IT!', 'split');
    }
    if (c.state === 'swoop' || c.state === 'carry'){ c.state = 'leave'; SFX.caw(); }
  }
  SFX.nudge();
  const cab = document.getElementById('cab');
  cab.classList.remove('shake');
  void cab.offsetWidth;
  cab.classList.add('shake');
  if (lastNudges.length >= 4){
    tiltedUntil = now + 6000;
    lastNudges = [];
    document.getElementById('tiltbanner').classList.add('on');
    SFX.tilt();
    setTimeout(() => document.getElementById('tiltbanner').classList.remove('on'), 6000);
    popup(W / 2, 300, 'TILT', 'tilt');
  }
}

};
let T = THEMES.orchard;
function applyTheme(){
  T = THEMES[S.tw.theme] || THEMES.orchard;
  cv.style.background = T.board;
}


function draw(){
  cx.clearRect(0, 0, W, H);

  /* backboard grain */
  cx.strokeStyle = T.grain;
  cx.lineWidth = 1;
  for (let y = 40; y < H; y += 36){
    cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke();
  }

  /* launcher rail + aim */
  cx.fillStyle = T.rail;
  cx.fillRect(0, 84, W, 3);
  const ax = Math.max(BALL_R + 4, Math.min(W - BALL_R - 4, aimX));
  cx.fillStyle = T.aim;
  cx.beginPath(); cx.arc(ax, 72, 7, 0, 7); cx.fill();
  cx.strokeStyle = T.rail;
  cx.setLineDash([3, 6]);
  cx.beginPath(); cx.moveTo(ax, 84); cx.lineTo(ax, 130); cx.stroke();
  cx.setLineDash([]);

  /* rollover lanes: spell C-R-O-P, arm the kickback */
  for (const r of B.rolls){
    cx.beginPath(); cx.arc(r.x, r.y, 11 + (r.flash > 0 ? 2 : 0), 0, 7);
    if (r.lit){ cx.fillStyle = T.gold; cx.fill(); }
    cx.strokeStyle = r.lit ? T.goldRim : T.pegRim;
    cx.lineWidth = 1.5;
    cx.setLineDash(r.lit ? [] : [3, 3]);
    cx.stroke();
    cx.setLineDash([]);
    cx.font = '700 11px Optima,Candara,sans-serif';
    cx.fillStyle = r.lit ? T.ink : T.pegRim;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(r.ch, r.x, r.y + 0.5);
  }
  if (B.kickArmed){
    cx.font = '700 9px Optima,Candara,sans-serif';
    cx.fillStyle = T.slotHi;
    for (let i = 0; i < SLOT_N; i++){
      if (B.slots[i] === 1) cx.fillText('▲ SAVE', i * SLOT_W + SLOT_W / 2, SLOT_TOP - 20);
    }
  }

  /* the drop-target bank */
  for (const t of B.bank.targets){
    if (t.up){
      cx.fillStyle = T.bump;
      cx.fillRect(t.x - t.w / 2, t.y - t.h / 2, t.w, t.h);
      cx.strokeStyle = T.bumpRim; cx.lineWidth = 1.5;
      cx.strokeRect(t.x - t.w / 2, t.y - t.h / 2, t.w, t.h);
      cx.fillStyle = 'rgba(255,255,255,.3)';
      cx.fillRect(t.x - t.w / 2 + 2, t.y - t.h / 2 + 2, t.w - 4, 3);
    } else {
      cx.fillStyle = T.shadow;
      cx.fillRect(t.x - t.w / 2, t.y + t.h / 2 - 5, t.w, 5);
    }
  }

  /* pegs */
  for (const p of B.pegs){
    cx.beginPath();
    cx.arc(p.x, p.y, PEG_R + (p.flash > 0 ? 1.5 : 0), 0, 7);
    cx.fillStyle = p.flash > 0 ? T.pegHot : T.peg;
    cx.fill();
    cx.strokeStyle = T.pegRim; cx.lineWidth = 1; cx.stroke();
    cx.beginPath(); cx.arc(p.x - 1.4, p.y - 1.4, 1.4, 0, 7);
    cx.fillStyle = 'rgba(255,255,255,.5)'; cx.fill();
  }

  /* bumpers: toadstools, round or square per the Tinker's Hatch */
  const square = S.tw.bumper === 'square';
  for (const p of B.bumpers){
    const r = (square ? 15 : BUMP_R) + (p.flash > 0 ? 3 : 0);
    cx.fillStyle = p.flash > 0 ? T.bumpHalo + '.35)' : T.bumpHalo + '.14)';
    if (square){ cx.fillRect(p.x - r - 4, p.y - r - 4, (r + 4) * 2, (r + 4) * 2); }
    else { cx.beginPath(); cx.arc(p.x, p.y, r + 4, 0, 7); cx.fill(); }
    cx.fillStyle = tilted() ? T.bumpDead : T.bump;
    cx.strokeStyle = T.bumpRim; cx.lineWidth = 2;
    if (square){
      cx.fillRect(p.x - r, p.y - r, r * 2, r * 2);
      cx.strokeRect(p.x - r, p.y - r, r * 2, r * 2);
      cx.fillStyle = T.bumpFace;
      cx.fillRect(p.x - r * 0.45, p.y - r * 0.45, r * 0.9, r * 0.9);
    } else {
      cx.beginPath(); cx.arc(p.x, p.y, r, 0, 7); cx.fill(); cx.stroke();
      cx.beginPath(); cx.arc(p.x, p.y, r * 0.45, 0, 7);
      cx.fillStyle = T.bumpFace; cx.fill();
    }
    cx.font = '600 10px Optima,Candara,sans-serif';
    cx.fillStyle = T.bumpRim;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(String(bumperVal()), p.x, p.y + 0.5);
  }

  /* the prism peg, while it lasts */
  if (B.prism){
    const pr = B.prism;
    const hue = (performance.now() / 4) % 360;
    const r = 9 + (pr.flash > 0 ? 3 : 0);
    cx.beginPath(); cx.arc(pr.x, pr.y, r + 5, 0, 7);
    cx.fillStyle = 'hsla(' + hue + ',85%,60%,.25)'; cx.fill();
    cx.beginPath(); cx.arc(pr.x, pr.y, r, 0, 7);
    cx.fillStyle = 'hsl(' + hue + ',85%,60%)'; cx.fill();
    cx.strokeStyle = 'hsl(' + ((hue + 180) % 360) + ',85%,45%)'; cx.lineWidth = 2; cx.stroke();
    cx.beginPath(); cx.arc(pr.x - 2.5, pr.y - 2.5, 2.2, 0, 7);
    cx.fillStyle = 'rgba(255,255,255,.85)'; cx.fill();
    cx.font = '700 9px Optima,Candara,sans-serif';
    cx.fillStyle = 'rgba(255,255,255,.9)';
    cx.textAlign = 'center';
    cx.fillText('✦'.repeat(Math.max(0, pr.charges)), pr.x, pr.y + 22);
  }

  /* baskets */
  for (let i = 0; i < SLOT_N; i++){
    const x0 = i * SLOT_W;
    cx.fillStyle = T.basket;
    cx.fillRect(x0 + 2, SLOT_TOP, SLOT_W - 4, H - SLOT_TOP - 4);
    cx.strokeStyle = T.basketRim; cx.lineWidth = 2;
    cx.strokeRect(x0 + 2, SLOT_TOP, SLOT_W - 4, H - SLOT_TOP - 4);
    cx.strokeStyle = T.weave; cx.lineWidth = 1;
    for (let wy = SLOT_TOP + 10; wy < H - 10; wy += 10){
      cx.beginPath(); cx.moveTo(x0 + 4, wy); cx.lineTo(x0 + SLOT_W - 4, wy); cx.stroke();
    }
    const m = B.slots[i];
    cx.font = '600 15px Optima,Candara,sans-serif';
    cx.fillStyle = m >= 10 ? T.slotHi : m >= 5 ? T.slotMid : T.slotLo;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('×' + m, x0 + SLOT_W / 2, SLOT_TOP + 20);
  }
  cx.fillStyle = T.divider;
  for (let i = 1; i < SLOT_N; i++) cx.fillRect(i * SLOT_W - 2, SLOT_TOP - 12, 4, H - SLOT_TOP + 8);

  /* the paddle: hops, squashes, rings */
  const pw = padW() * (padPulse > 0 ? 1.05 : 1);
  const py0 = padYEff() + (padPulse > 0 ? 2 : 0);
  const ph = PAD_H * (padPulse > 0 ? 0.8 : 1);
  cx.fillStyle = T.shadow;
  cx.fillRect(padX - pw / 2 + 2, PAD_Y + 3, pw, PAD_H);
  const grad = cx.createLinearGradient(0, py0, 0, py0 + ph);
  grad.addColorStop(0, T.padA); grad.addColorStop(0.5, T.padB); grad.addColorStop(1, T.padC);
  cx.fillStyle = grad;
  cx.fillRect(padX - pw / 2, py0, pw, ph);
  cx.fillStyle = T.padCap;
  cx.fillRect(padX - pw / 2 - 3, py0 - 1, 6, ph + 2);
  cx.fillRect(padX + pw / 2 - 3, py0 - 1, 6, ph + 2);
  cx.fillStyle = padPulse > 0 ? 'rgba(255,255,255,.5)' : 'rgba(255,255,255,.25)';
  cx.fillRect(padX - pw / 2, py0 + 1, pw, 1.5);
  for (const f of padFx){
    const a = Math.max(0, 1 - f.t / 0.28);
    cx.globalAlpha = a * 0.8;
    cx.strokeStyle = T.padCap; cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(f.x, f.y, (f.big ? 10 : 6) + f.t * (f.big ? 110 : 70), 0, 7);
    cx.stroke();
    cx.globalAlpha = 1;
  }

  /* balls */
  for (const b of balls){
    cx.beginPath(); cx.arc(b.x, b.y + 2, BALL_R, 0, 7);
    cx.fillStyle = T.shadow; cx.fill();
    cx.beginPath(); cx.arc(b.x, b.y, BALL_R, 0, 7);
    cx.fillStyle = b.golden ? T.gold : T.ball;
    cx.fill();
    cx.strokeStyle = b.golden ? T.goldRim : T.ballRim;
    cx.lineWidth = 1.5; cx.stroke();
    cx.beginPath(); cx.arc(b.x - 2, b.y - 2.5, 2.2, 0, 7);
    cx.fillStyle = 'rgba(255,255,255,.6)'; cx.fill();
    cx.strokeStyle = T.stem; cx.lineWidth = 1.6;
    cx.beginPath(); cx.moveTo(b.x + 1, b.y - BALL_R + 1); cx.lineTo(b.x + 3.5, b.y - BALL_R - 3); cx.stroke();
  }

  /* the crow, if one is about */
  for (const c of crows){
    if (c.state === 'wait' || c.state === 'gone') continue;
    const dir = c.vx >= 0 ? 1 : -1;
    const w = Math.sin(c.flap * 18) * 9;
    cx.save();
    cx.translate(c.x, c.y);
    cx.scale(dir, 1);
    cx.fillStyle = T.ink;
    cx.beginPath(); cx.ellipse(0, 0, 11, 5.5, 0, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(9, -3, 4.5, 0, 7); cx.fill();
    cx.beginPath(); cx.moveTo(13, -3.5); cx.lineTo(19, -1.5); cx.lineTo(13, -0.5); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(-10, 0); cx.lineTo(-17, -3); cx.lineTo(-16, 3); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(-2, -2); cx.quadraticCurveTo(-6, -10 - w, -16, -8 - w); cx.quadraticCurveTo(-8, -3, -2, -1); cx.fill();
    cx.beginPath(); cx.moveTo(2, -2); cx.quadraticCurveTo(6, -10 + w * 0.6, 14, -9 + w * 0.6); cx.quadraticCurveTo(7, -3, 2, -1); cx.fill();
    cx.fillStyle = T.board;
    cx.beginPath(); cx.arc(9.5, -3.5, 1.1, 0, 7); cx.fill();
    cx.restore();
  }

  /* score popups */
  for (const q of popups){
    cx.globalAlpha = Math.max(0, 1 - q.t);
    cx.font = '700 ' + (q.text === 'TILT' ? 40 : 14) + 'px Optima,Candara,sans-serif';
    cx.fillStyle = (T.pop && T.pop[q.color]) || q.color;
    cx.textAlign = 'center';
    cx.fillText(q.text, q.x, q.y);
    cx.globalAlpha = 1;
  }
}

/* ================= persistence ================= */
function save(){
  try { localStorage.setItem('bc:save', JSON.stringify({ coins: S.coins, best: S.best, muted, up: S.up, tw: S.tw })); } catch (e){}
}
function load(){
  let d = null;
  try { d = JSON.parse(localStorage.getItem('bc:save') || 'null'); } catch (e){}
  S = d
    ? { coins: d.coins || 0, best: d.best || 0,
        up: Object.assign({}, DEFAULT_SAVE.up, d.up || {}),
        tw: Object.assign({}, DEFAULT_SAVE.tw, d.tw || {}) }
    : JSON.parse(JSON.stringify(DEFAULT_SAVE));
  muted = d ? !!d.muted : false;
}
function boardBestKey(){ return 'bc:best:' + B.seed; }
function bumpBest(payout){
  try {
    const prev = parseInt(localStorage.getItem(boardBestKey()) || '0', 10);
    if (payout > prev) localStorage.setItem(boardBestKey(), String(payout));
  } catch (e){}
}

/* ================= shop ================= */
const SHOP = [
  { k: 'hopper', nm: 'Bigger hopper', ds: () => 'Hold ' + (hopperCap() + 1) + ' apples', base: 150, x: 1.7 },
  { k: 'regen', nm: 'Quicker orchard', ds: () => 'New apple every ' + (Math.max(900, 4000 * Math.pow(0.85, S.up.regen + 1)) / 1000).toFixed(1) + 's', base: 200, x: 1.7 },
  { k: 'bumper', nm: 'Louder bumpers', ds: () => 'Bumpers worth ' + (25 + 12 * (S.up.bumper + 1)), base: 250, x: 1.7 },
  { k: 'gold', nm: 'Golden pippins', ds: () => (4 * (S.up.gold + 1)) + '% chance of a ×5 apple', base: 400, x: 1.8, max: 10 },
  { k: 'split', nm: 'Twin windfall', ds: () => (5 * (S.up.split + 1)) + '% split on bumper hit', base: 600, x: 1.9, max: 8 },
  { k: 'paddle', nm: 'Wider plank', ds: () => 'Paddle ' + (66 + 13 * (S.up.paddle + 1)) + ' wide — more saves, more english', base: 300, x: 1.7, max: 6 },
  { k: 'nudge', nm: 'Loosen the bolts', ds: () => S.up.nudge ? 'Nudge is yours. Mind the TILT.' : 'Unlock NUDGE (N). Mind the TILT.', base: 500, x: 1, max: 1 }
];
function cost(it){ return Math.round(it.base * Math.pow(it.x, S.up[it.k])); }
function renderShop(){
  document.getElementById('shop-coins').textContent = S.coins + ' coins';
  const box = document.getElementById('shop-items');
  box.innerHTML = SHOP.map(it => {
    const lv = S.up[it.k];
    const maxed = it.max && lv >= it.max;
    return '<div class="item"><div class="info">' +
      '<div class="nm">' + it.nm + ' <span class="lvl">' + (maxed ? 'MAX' : 'lv ' + lv) + '</span></div>' +
      '<div class="ds">' + it.ds() + '</div></div>' +
      '<button data-buy="' + it.k + '" ' + (maxed || S.coins < cost(it) ? 'disabled' : '') + '>' +
      (maxed ? '—' : cost(it) + ' ¢') + '</button></div>';
  }).join('');
  box.querySelectorAll('[data-buy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const it = SHOP.find(i => i.k === btn.getAttribute('data-buy'));
      if (!it || (it.max && S.up[it.k] >= it.max) || S.coins < cost(it)) return;
      S.coins -= cost(it);
      S.up[it.k]++;
      SFX.buy();
      save();
      renderShop(); renderLCD(); renderHopper(); renderNudge();
    });
  });
}
function renderLCD(){
  document.getElementById('lcd-coins').textContent = S.coins;
  document.getElementById('lcd-best').textContent = S.best;
}
function renderHopper(){
  const el = document.getElementById('hopper');
  el.textContent = '●'.repeat(hopper) + '○'.repeat(Math.max(0, hopperCap() - hopper));
}
function renderNudge(){
  document.getElementById('btn-nudge').style.display = S.up.nudge ? '' : 'none';
}

/* ================= the tinker's hatch ================= */
function padFeelWord(v){
  return v <= 25 ? 'heavy' : v <= 40 ? 'steady' : v <= 60 ? 'lively' : 'lightning';
}
function bounceWord(v){
  return v <= 58 ? 'oaken' : v <= 70 ? 'seasoned' : v <= 82 ? 'rubbery' : 'superball';
}
function renderTweaks(){
  const slider = document.getElementById('tw-pad');
  slider.value = S.tw.pad;
  document.getElementById('tw-pad-lab').textContent = padFeelWord(S.tw.pad);
  const bs = document.getElementById('tw-bounce');
  bs.value = S.tw.bounce;
  document.getElementById('tw-bounce-lab').textContent = bounceWord(S.tw.bounce);
  document.querySelectorAll('#tw-theme button').forEach(b =>
    b.setAttribute('aria-pressed', b.getAttribute('data-th') === S.tw.theme ? 'true' : 'false'));
  document.querySelectorAll('#tw-bump button').forEach(b =>
    b.setAttribute('aria-pressed', b.getAttribute('data-bp') === S.tw.bumper ? 'true' : 'false'));
}
document.getElementById('tw-pad').addEventListener('input', function(){
  S.tw.pad = +this.value;
  document.getElementById('tw-pad-lab').textContent = padFeelWord(S.tw.pad);
  save();
});
document.getElementById('tw-bounce').addEventListener('input', function(){
  S.tw.bounce = +this.value;
  document.getElementById('tw-bounce-lab').textContent = bounceWord(S.tw.bounce);
  save();
});
document.querySelectorAll('#tw-theme button').forEach(b => {
  b.addEventListener('click', () => {
    S.tw.theme = b.getAttribute('data-th');
    applyTheme(); save(); renderTweaks();
    SFX.buy();
  });
});
document.querySelectorAll('#tw-bump button').forEach(b => {
  b.addEventListener('click', () => {
    S.tw.bumper = b.getAttribute('data-bp');
    save(); renderTweaks();
    SFX.bumper();
  });
});
document.getElementById('tw-reset').addEventListener('click', () => {
  if (!confirm('Sell the machine? Coins, upgrades, tweaks, and board bests all go. The boards themselves are safe in their seeds.')) return;
  try {
    const doomed = [];
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k && k.indexOf('bc:') === 0) doomed.push(k);
    }
    doomed.forEach(k => localStorage.removeItem(k));
  } catch (e){}
  location.reload();
});
function toast(msg){
  const n = document.createElement('div');
  n.className = 'toast'; n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2800);
}

/* ================= input ================= */
function canvasX(e){
  const r = cv.getBoundingClientRect();
  const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
  return (clientX - r.left) * (W / r.width);
}
cv.addEventListener('mousemove', e => { aimX = canvasX(e); });
cv.addEventListener('mousedown', e => { aimX = canvasX(e); dropBall(); });
cv.addEventListener('contextmenu', e => { e.preventDefault(); padJump(); });
cv.addEventListener('touchstart', e => { aimX = canvasX(e); dropBall(); e.preventDefault(); }, { passive: false });
cv.addEventListener('touchmove', e => { aimX = canvasX(e); e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === ' '){ padJump(); e.preventDefault(); }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Enter'){ dropBall(); e.preventDefault(); }
  if (e.key === 'n' || e.key === 'N') nudge();
  if (e.key === 'ArrowLeft') aimX = Math.max(BALL_R + 4, aimX - 36);
  if (e.key === 'ArrowRight') aimX = Math.min(W - BALL_R - 4, aimX + 36);
});
document.getElementById('btn-nudge').addEventListener('click', nudge);
document.getElementById('btn-new').addEventListener('click', () => { location.hash = randomSeed(); });
document.getElementById('btn-daily').addEventListener('click', () => { location.hash = 'daily'; });
document.getElementById('btn-mute').addEventListener('click', function(){
  muted = !muted;
  this.textContent = 'Sound: ' + (muted ? 'off' : 'on');
  save();
});
const CANONICAL = 'https://davidwbritt.github.io/bumper-crop/';
document.getElementById('btn-share').addEventListener('click', () => {
  const url = CANONICAL + '#' + B.seed;
  const ok = () => toast('Board link copied — same pegs for everyone');
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(ok, () => toast('Copy blocked — ' + url));
  } else toast(url);
});

/* ================= loop & boot ================= */
let lastT = 0;
function loop(ts){
  requestAnimationFrame(loop);
  if (!lastT) lastT = ts;
  let dt = Math.min(0.05, (ts - lastT) / 1000);
  lastT = ts;
  /* substeps keep fast balls out of the pegs' insides */
  const n = Math.max(1, Math.ceil(dt / (1 / 240)));
  for (let i = 0; i < n; i++) step(dt / n);
  draw();
}
function boot(){
  let seed = decodeURIComponent(location.hash.replace(/^#/, '')).trim();
  if (seed === 'daily') seed = 'daily-' + new Date().toISOString().slice(0, 10);
  if (!seed) seed = randomSeed();
  history.replaceState(null, '', '#' + seed);
  B = buildBoard(seed);
  balls = [];
  popups = [];
  document.getElementById('f-seed').textContent = seed;
  document.title = 'Bumper Crop — board ' + seed;
  renderLCD(); renderHopper(); renderShop(); renderNudge();
  document.getElementById('btn-mute').textContent = 'Sound: ' + (muted ? 'off' : 'on');
}
try { if (window.self !== window.top) document.documentElement.classList.add('embedded'); } catch (e){ document.documentElement.classList.add('embedded'); }
load();
applyTheme();
renderTweaks();
hopper = hopperCap();
regenAt = performance.now() + regenMs();
window.addEventListener('hashchange', boot);
boot();
requestAnimationFrame(loop);
</script>
